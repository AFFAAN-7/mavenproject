name: maven-project
on:
  push:
    branches: ["master"]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: cloning maven project
        uses: actions/checkout@v7.0.0
      - name: installing java
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
           
      - name: generating the package
        run: mvn package
  
